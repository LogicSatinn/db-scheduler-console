spring.datasource.url=jdbc:h2:mem:demo;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.sql.init.schema-locations=classpath:schema.sql,classpath:db-scheduler-console/migrations/h2.sql
db-scheduler.polling-interval=1s
db-scheduler-console.history.retention=7d
demo.console.username=admin
demo.console.password=demo-password
